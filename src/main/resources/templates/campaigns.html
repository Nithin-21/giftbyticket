<table border="1" id="campaignTable"></table>

<script>

    window.onload = loadCampaigns;

    async function loadCampaigns() {

        const response =
            await fetch(
                'http://localhost:8080/api/campaigns'
            );

        const campaigns =
            await response.json();

        let html =
            "<tr><th>ID</th><th>Name</th><th>Action</th></tr>";

        campaigns.forEach(c => {

            html += `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.campaignName}</td>
                    <td>
                        <button onclick="participate(${c.id})">
                            Participate
                        </button>
                    </td>
                </tr>`;
        });

        document.getElementById(
            "campaignTable"
        ).innerHTML = html;
    }

    async function participate(campaignId) {

    const userId =
        localStorage.getItem("userId");

    const response =
        await fetch(
            "http://localhost:8080/api/entries",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userId: userId,
                    campaignId: campaignId
                })
            }
        );

    if (!response.ok) {

        const errorText =
            await response.text();

        alert(errorText);

        return;
    }

    const data =
        await response.json();

    console.log(data);

    alert(
        "Successfully registered for " +
        data.campaignName +
        "\n\nCoupon Assigned: " +
        data.couponTitle +
        "\nGiveaway Code: " +
        data.giveawayCode
    );
}



</script>
